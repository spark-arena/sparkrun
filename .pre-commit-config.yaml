default_install_hook_types: [pre-commit, pre-push]
repos:
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.3
    hooks:
      - id: uv-lock
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff-check
        args: [ --fix ]
        stages: [pre-push]
      - id: ruff-format
        stages: [pre-push]
